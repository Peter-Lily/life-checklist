/* =========================
   状态
========================= */

function load(){
  let raw = localStorage.getItem("life_pro");
  if(raw) return JSON.parse(raw);

  let obj={};
  for(let k in DATA){
    obj[k]=DATA[k].map(t=>({text:t,done:false}));
  }
  return obj;
}

let state=load();

function save(){
  localStorage.setItem("life_pro",JSON.stringify(state));
}

/* =========================
   统计
========================= */

function calc(){
  let total=0,done=0;
  for(let k in state){
    state[k].forEach(i=>{
      total++;
      if(i.done) done++;
    });
  }
  return {total,done,percent:Math.round(done/total*100)};
}

/* =========================
   导出功能
========================= */

function exportData(){
  const data = JSON.stringify(state,null,2);
  const blob = new Blob([data],{type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href=url;
  a.download="人生清单数据.json";
  a.click();

  URL.revokeObjectURL(url);
}

/* =========================
   渲染
========================= */

function render(){
  let app=document.getElementById("app");
  app.innerHTML="";

  for(let cat in state){
    let card=document.createElement("div");
    card.className="card";

    let title=document.createElement("h3");
    title.innerText=cat;
    card.appendChild(title);

    state[cat].forEach(item=>{
      let div=document.createElement("div");
      div.className="item"+(item.done?" done":"");
      div.innerText=item.text;

      div.onclick=()=>{
        item.done=!item.done;
        save();
        render();
      };

      card.appendChild(div);
    });

    app.appendChild(card);
  }

  let s=calc();

  document.getElementById("bar").style.width=s.percent+"%";
  document.getElementById("stat").innerText=
    `${s.done}/${s.total} 完成 · ${s.percent}%`;
}

render();

</script>
