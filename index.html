<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>人生已完成清单</title>
<style>
body{
  margin:0;
  font-family: -apple-system;
  background:#0f0f0f;
  color:white;
  padding:20px;
}
.card{
  background:#1c1c1c;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}
.item{
  padding:8px;
  margin:5px 0;
  background:#2a2a2a;
  border-radius:8px;
  cursor:pointer;
}
.item.done{
  background:#14532d;
}
</style>
</head>

<body>

<h1>人生已完成清单</h1>
<div id="app"></div>

<script>

const data = {
  "别人给予我的": [
    "被送礼物","被记得生日","被拥抱","被理解","被支持"
  ],
  "我主动完成的": [
    "送别人礼物","主动道歉","第一次旅行","独自旅行","第一次赚钱"
  ]
};

function load(){
  let saved = localStorage.getItem("life");
  if(saved) return JSON.parse(saved);

  let obj = {};
  for(let k in data){
    obj[k] = data[k].map(t => ({text:t,done:false}));
  }
  return obj;
}

let state = load();

function save(){
  localStorage.setItem("life", JSON.stringify(state));
}

function render(){
  let app = document.getElementById("app");
  app.innerHTML = "";

  for(let cat in state){
    let div = document.createElement("div");
    div.className = "card";

    let title = document.createElement("h3");
    title.innerText = cat;
    div.appendChild(title);

    state[cat].forEach((item,i)=>{
      let el = document.createElement("div");
      el.className = "item" + (item.done ? " done" : "");
      el.innerText = item.text;

      el.onclick = ()=>{
        item.done = !item.done;
        save();
        render();
      };

      div.appendChild(el);
    });

    app.appendChild(div);
  }
}

render();

</script>

</body>
</html>
